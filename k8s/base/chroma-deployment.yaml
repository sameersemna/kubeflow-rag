---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma
  namespace: kubeflow-rag
  labels:
    app: chroma
    component: vector-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chroma
  template:
    metadata:
      labels:
        app: chroma
        component: vector-store
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:0.4.22
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ANONYMIZED_TELEMETRY
              value: "false"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: kubeflow-rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

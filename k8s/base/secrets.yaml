---
# Secrets (use sealed-secrets or external-secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: kubeflow-rag
type: Opaque
stringData:
  openai-api-key: "REPLACE_WITH_YOUR_OPENAI_KEY"
  anthropic-api-key: "REPLACE_WITH_YOUR_ANTHROPIC_KEY"
  cohere-api-key: "REPLACE_WITH_YOUR_COHERE_KEY"
  pinecone-api-key: "REPLACE_WITH_YOUR_PINECONE_KEY"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: kubeflow-rag
data:
  config.yaml: |
    project:
      name: kubeflow-rag
      version: "1.0.0"

    llm:
      provider: openai
      model: gpt-4o
      temperature: 0.1
      max_tokens: 2048

    embedding:
      provider: openai
      model: text-embedding-3-small
      dimensions: 1536
      batch_size: 100

    vector_store:
      provider: chroma
      host: chroma-service
      port: 8000
      collection: rag_documents

    ingestion:
      chunk_size: 1000
      chunk_overlap: 200
      splitter: recursive

    retrieval:
      strategy: hybrid
      top_k: 5
      score_threshold: 0.65

    generation:
      include_sources: true
      max_sources: 3
      response_format: markdown

    evaluation:
      enabled: true
      framework: custom

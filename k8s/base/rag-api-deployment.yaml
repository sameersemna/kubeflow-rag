---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: kubeflow-rag
  labels:
    app: rag-api
    component: serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rag-api
        component: serving
    spec:
      serviceAccountName: rag-sa
      containers:
        - name: rag-api
          image: YOUR_REGISTRY/rag-ui:latest  # Update with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: anthropic-api-key
                  optional: true
            - name: VECTOR_STORE_HOST
              value: chroma-service
            - name: CONFIG_PATH
              value: /app/configs/config.yaml
          volumeMounts:
            - name: config-volume
              mountPath: /app/configs
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config-volume
          configMap:
            name: rag-config
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
  namespace: kubeflow-rag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

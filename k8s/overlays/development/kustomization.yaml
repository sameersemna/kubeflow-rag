apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubeflow-rag-dev

resources:
  - ../../base

# Dev-specific patches
patches:
  # Single replica for dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: rag-api

  # Lower resource requests for dev
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
    target:
      kind: Deployment
      name: rag-api

  # Use local dev image in kind
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: rag-ui:latest
    target:
      kind: Deployment
      name: rag-api

  # Keep dev autoscaling lower
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: rag-api-hpa

  # Use Chroma image with v2 API probes
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: chromadb/chroma:latest
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/path
        value: /api/v2/heartbeat
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: /api/v2/heartbeat
    target:
      kind: Deployment
      name: chroma

labels:
  - includeSelectors: true
    pairs:
      environment: development

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubeflow-rag

bases:
  - ../../base

# Production-specific patches
patches:
  # Scale up replicas for production
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: rag-api

  # Use production image tag
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: YOUR_REGISTRY/rag-ui:v1.0.0
    target:
      kind: Deployment
      name: rag-api

  # Production resource limits
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
    target:
      kind: Deployment
      name: rag-api

commonLabels:
  environment: production

configMapGenerator:
  - name: rag-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO

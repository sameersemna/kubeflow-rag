version: "3.9"

# ============================================================
# Kubeflow RAG Template - Docker Compose (Local Dev)
# ============================================================
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d chroma       # Start only vector DB
#   docker-compose --profile gpu up   # Include GPU services
# ============================================================

services:

  # ──────────────────────────────────────────
  # Vector Stores (choose one, or run multiple)
  # ──────────────────────────────────────────

  chroma:
    image: chromadb/chroma:0.4.22
    container_name: rag-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_PROVIDER=
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.8.3
    container_name: rag-qdrant
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  weaviate:
    image: semitechnologies/weaviate:1.24.5
    container_name: rag-weaviate
    profiles: ["weaviate"]
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Local LLM (Ollama) - optional, GPU-enabled
  # ──────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    profiles: ["ollama", "local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  # ──────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ──────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: rag-minio
    profiles: ["storage", "full"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────
  # RAG API Server
  # ──────────────────────────────────────────

  rag-api:
    build:
      context: .
      dockerfile: docker/ui/Dockerfile
    container_name: rag-api
    profiles: ["api", "full"]
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CONFIG_PATH=/app/configs/config.yaml
      - VECTOR_STORE_HOST=chroma
    volumes:
      - ./configs:/app/configs:ro
      - ./components:/app/components:ro
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Ingestion Worker
  # ──────────────────────────────────────────

  rag-ingest:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
    container_name: rag-ingestion
    profiles: ["worker", "full"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ingestion_output:/app/output
    restart: "no"

  # ──────────────────────────────────────────
  # Monitoring (Prometheus + Grafana)
  # ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: rag-prometheus
    profiles: ["monitoring", "full"]
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/base/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    container_name: rag-grafana
    profiles: ["monitoring", "full"]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

# ──────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────

volumes:
  chroma_data:
  qdrant_data:
  weaviate_data:
  ollama_models:
  minio_data:
  ingestion_output:
  prometheus_data:
  grafana_data:

# ──────────────────────────────────────────
# Networks
# ──────────────────────────────────────────

networks:
  default:
    name: rag-network
    driver: bridge

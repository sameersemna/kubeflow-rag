name: CI/CD - Kubeflow RAG Template

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rag

jobs:
  # ──────────────────────────────────────────
  # Lint & Test
  # ──────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff black mypy pyyaml
          pip install sentence-transformers chromadb
          pip install -r docker/ingestion/requirements.txt

      - name: Lint with ruff
        run: ruff check components/ pipelines/ examples/

      - name: Format check with black
        run: black --check components/ pipelines/ examples/

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --cov=components \
            --cov-report=xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml

  # ──────────────────────────────────────────
  # Pipeline Compilation Check
  # ──────────────────────────────────────────
  compile-pipelines:
    name: Compile KFP Pipelines
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install KFP SDK
        run: pip install kfp>=2.0.0 pyyaml

      - name: Compile Use Case 1 Pipeline
        run: |
          python pipelines/usecase1_document_qa/pipeline.py \
            --compile \
            --output /tmp/uc1_pipeline.yaml
          ls -la /tmp/uc1_pipeline.yaml

      - name: Compile Use Case 2 Pipeline
        run: |
          python pipelines/usecase2_knowledge_base/pipeline.py \
            --compile \
            --output /tmp/uc2_pipeline.yaml
          ls -la /tmp/uc2_pipeline.yaml

      - name: Upload compiled pipelines
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pipelines
          path: /tmp/*.yaml

  # ──────────────────────────────────────────
  # Build Docker Images
  # ──────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        component: [ingestion, embedding, retrieval, generation, evaluation, ui]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # Security Scan
  # ──────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ingestion:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ──────────────────────────────────────────
  # Release
  # ──────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [compile-pipelines, build-images]
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Download compiled pipelines
        uses: actions/download-artifact@v4
        with:
          name: compiled-pipelines
          path: release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.yaml
